<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sivarr — Metrics</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e8e8e8;font-size:15px;line-height:1.5}
a{color:#0FDBAD;text-decoration:none}

/* ── Layout ── */
.top{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid #1e1e1e;background:#151515}
.brand{font-size:1.1rem;font-weight:800;color:#0FDBAD;letter-spacing:-.03em}
.nav-links{display:flex;gap:18px;font-size:.85rem}
.nav-links a{color:#888}
.nav-links a:hover{color:#e8e8e8}

.page{max-width:1100px;margin:0 auto;padding:32px 24px}
h1{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.subtitle{color:#666;font-size:.88rem;margin-bottom:32px}

/* ── Login gate ── */
#login-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
#login-gate input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;padding:11px 16px;color:#e8e8e8;font-size:.95rem;width:280px;outline:none}
#login-gate input:focus{border-color:#0FDBAD}
#login-gate button{background:#0FDBAD;color:#000;border:none;border-radius:9px;padding:11px 28px;font-weight:700;font-size:.95rem;cursor:pointer;width:280px}
#login-err{color:#f87171;font-size:.82rem}

/* ── KPI row ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:32px}
.kpi{background:#161616;border:1px solid #1e1e1e;border-radius:12px;padding:18px 20px}
.kpi-label{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#555;margin-bottom:6px}
.kpi-val{font-size:2rem;font-weight:800;color:#e8e8e8;letter-spacing:-.03em}
.kpi-sub{font-size:.75rem;color:#555;margin-top:4px}

/* ── Cards ── */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:700px){.cards{grid-template-columns:1fr}}
.card{background:#161616;border:1px solid #1e1e1e;border-radius:14px;padding:22px}
.card-title{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#555;margin-bottom:18px}

/* ── DAU chart ── */
.chart-wrap{height:100px;display:flex;align-items:flex-end;gap:3px;overflow:hidden}
.chart-bar{flex:1;background:#0FDBAD22;border-radius:3px 3px 0 0;min-width:4px;position:relative;cursor:default;transition:background .15s}
.chart-bar:hover{background:#0FDBAD55}
.chart-bar .tip{display:none;position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:#0f0f0f;border:1px solid #2a2a2a;border-radius:6px;padding:3px 8px;font-size:.68rem;white-space:nowrap;color:#e8e8e8;pointer-events:none}
.chart-bar:hover .tip{display:block}
.chart-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:.65rem;color:#444}

/* ── Feature list ── */
.feat-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a1a}
.feat-row:last-child{border-bottom:none}
.feat-name{font-size:.85rem;color:#ccc;flex:1;text-transform:capitalize}
.feat-bar-wrap{width:140px;height:6px;background:#1e1e1e;border-radius:3px;overflow:hidden}
.feat-bar{height:100%;background:#0FDBAD;border-radius:3px;transition:width .4s}
.feat-count{font-size:.78rem;color:#555;width:36px;text-align:right}

/* ── Period selector ── */
.period-row{display:flex;gap:8px;margin-bottom:24px}
.period-btn{padding:6px 16px;border-radius:20px;border:1px solid #2a2a2a;background:transparent;color:#888;font-size:.8rem;cursor:pointer;transition:all .15s}
.period-btn.active{background:#0FDBAD;color:#000;border-color:#0FDBAD;font-weight:700}
</style>
</head>
<body>

<div class="top">
  <div class="brand">Sivarr</div>
  <div class="nav-links">
    <a href="/admin">← Admin</a>
    <a href="/app">App</a>
  </div>
</div>

<!-- Login gate -->
<div id="login-gate">
  <div style="font-size:1.2rem;font-weight:800;margin-bottom:4px">Metrics Dashboard</div>
  <div style="color:#555;font-size:.85rem;margin-bottom:16px">Admin access only</div>
  <input type="password" id="pw-input" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()">
  <input type="text" id="totp-input" inputmode="numeric" autocomplete="one-time-code"
    maxlength="6" placeholder="2FA code (if enabled)" onkeydown="if(event.key==='Enter')doLogin()"
    style="margin-top:8px">
  <div id="login-err"></div>
  <button onclick="doLogin()">Sign in</button>
</div>

<!-- Dashboard (hidden until authed) -->
<div id="dashboard" style="display:none">
  <div class="page">
    <h1>Product Metrics</h1>
    <p class="subtitle">Signups · Active users · Feature usage · Retention</p>

    <div class="period-row">
      <button class="period-btn active" onclick="load(7,this)">7 days</button>
      <button class="period-btn" onclick="load(14,this)">14 days</button>
      <button class="period-btn" onclick="load(30,this)">30 days</button>
    </div>

    <!-- KPI row -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Total Users</div>
        <div class="kpi-val" id="k-total">—</div>
        <div class="kpi-sub">all time signups</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">DAU</div>
        <div class="kpi-val" id="k-dau">—</div>
        <div class="kpi-sub">active today</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">WAU</div>
        <div class="kpi-val" id="k-wau">—</div>
        <div class="kpi-sub">active this week</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">DAU / WAU</div>
        <div class="kpi-val" id="k-ratio">—</div>
        <div class="kpi-sub">stickiness ratio</div>
      </div>
    </div>

    <div class="cards">
      <!-- DAU chart -->
      <div class="card">
        <div class="card-title">Daily Active Users</div>
        <div class="chart-wrap" id="dau-chart"></div>
        <div class="chart-labels" id="dau-labels"></div>
      </div>

      <!-- Top features -->
      <div class="card">
        <div class="card-title">Most-used Features</div>
        <div id="feat-list"></div>
      </div>
    </div>

  </div>
</div>

<script>
let _token = '';

async function doLogin() {
  const pw   = document.getElementById('pw-input').value;
  const totp = (document.getElementById('totp-input').value || '').trim();
  const err  = document.getElementById('login-err');
  err.textContent = '';
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, totp }),
    });
    const d = await r.json();
    if (!r.ok || !d.token) throw new Error(d.detail || 'Wrong password');
    _token = d.token;
    document.getElementById('login-gate').style.display    = 'none';
    document.getElementById('dashboard').style.display     = 'block';
    load(7, document.querySelector('.period-btn.active'));
  } catch(e) {
    err.textContent = e.message;
  }
}

async function load(days, btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const r = await fetch(`/api/admin/metrics?token=${encodeURIComponent(_token)}&days=${days}`);
  if (!r.ok) return;
  const d = await r.json();

  document.getElementById('k-total').textContent = d.total_users ?? '—';
  document.getElementById('k-dau').textContent   = d.dau ?? 0;
  document.getElementById('k-wau').textContent   = d.wau ?? 0;
  const ratio = d.wau ? Math.round((d.dau / d.wau) * 100) + '%' : '—';
  document.getElementById('k-ratio').textContent = ratio;

  // DAU chart
  const series  = d.dau_series || {};
  const entries = Object.entries(series).sort((a,b) => a[0].localeCompare(b[0]));
  const maxVal  = Math.max(...entries.map(e => e[1]), 1);
  const chart   = document.getElementById('dau-chart');
  const labels  = document.getElementById('dau-labels');
  chart.innerHTML = entries.map(([date, count]) => {
    const pct  = Math.round((count / maxVal) * 100);
    const label = date.slice(5); // MM-DD
    return `<div class="chart-bar" style="height:${Math.max(pct,2)}%">
      <div class="tip">${label}: ${count}</div>
    </div>`;
  }).join('');
  // Show first, last and midpoint date labels
  if (entries.length) {
    const first = entries[0][0].slice(5);
    const last  = entries[entries.length-1][0].slice(5);
    labels.innerHTML = `<span>${first}</span><span>${last}</span>`;
  }

  // Top features
  const feats  = d.top_features || [];
  const maxF   = feats[0]?.[1] || 1;
  const featEl = document.getElementById('feat-list');
  featEl.innerHTML = feats.length
    ? feats.map(([panel, count]) => `
      <div class="feat-row">
        <div class="feat-name">${panel}</div>
        <div class="feat-bar-wrap"><div class="feat-bar" style="width:${Math.round(count/maxF*100)}%"></div></div>
        <div class="feat-count">${count}</div>
      </div>`).join('')
    : '<div style="color:#444;font-size:.85rem;padding:12px 0">No feature data yet — data builds up as users navigate.</div>';
}
</script>
</body>
</html>
